# ---------------------------------------------------------------------------
# sync.yml — Incremental DB sync from old Rust service to new Python service.
#
# Runs every 5 minutes during Alpha testing. Copies the sync script into
# the Patroni container and executes it there (where psql is available).
#
# Disable after go-live: gh workflow disable sync.yml
# Manual trigger: gh workflow run sync.yml
# ---------------------------------------------------------------------------

name: Incremental DB Sync (Alpha)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  sync:
    name: Sync old DB → new DB
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Load config
        run: |
          grep -v '^#' project.config | grep -v '^\s*$' >> $GITHUB_ENV
          grep -v '^#' servers.config | grep -v '^\s*$' >> $GITHUB_ENV

      - name: Copy sync script to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SERVER_1_IP }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.HETZNER_BARE_METAL_GITHUB_ACTIONS_SSH_PRIVATE_KEY }}
          source: "scripts/incremental-sync.sh"
          target: /home/deploy/yral-chat-ai-sync

      - name: Run sync inside Patroni container
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.SERVER_1_IP }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.HETZNER_BARE_METAL_GITHUB_ACTIONS_SSH_PRIVATE_KEY }}
          command_timeout: 5m
          envs: OLD_DB_URL,NEW_DB_URL,SWARM_STACK
          script: |
            # Find Patroni container
            PATRONI=$(docker ps --format '{{.Names}}' | grep "${SWARM_STACK}_patroni-rishi-1" | head -1)
            [ -z "$PATRONI" ] && { echo "ERROR: No Patroni container"; exit 1; }

            # Copy script into container
            docker cp /home/deploy/yral-chat-ai-sync/scripts/incremental-sync.sh "$PATRONI:/tmp/sync.sh"
            docker exec "$PATRONI" chmod +x /tmp/sync.sh

            # Run with both DB URLs
            docker exec \
              -e OLD_DB_URL="$OLD_DB_URL" \
              -e NEW_DB_URL="$NEW_DB_URL" \
              "$PATRONI" /tmp/sync.sh
        env:
          OLD_DB_URL: ${{ secrets.OLD_DB_URL }}
          NEW_DB_URL: ${{ secrets.DATABASE_URL_SERVER_1 }}
          SWARM_STACK: ${{ env.SWARM_STACK }}
