# One-time workflow to fetch YRAL_METADATA_NOTIFICATION_API_KEY from Vault
# and set it as a GitHub Secret. Delete after use.
name: Fetch Vault Secret

on:
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Import Secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.yral.com
          method: jwt
          role: yral-chat-ai-role
          jwtGithubAudience: "https://github.com/dolr-ai"
          secrets: |
            secret/data/yral-chat-ai/YRAL_METADATA_NOTIFICATION_API_KEY value | NOTIFICATION_KEY ;

      - name: Verify secret was fetched
        run: |
          if [ -z "${{ env.NOTIFICATION_KEY }}" ]; then
            echo "ERROR: Secret was empty"
            exit 1
          fi
          echo "Secret fetched successfully (length: ${#NOTIFICATION_KEY} chars)"
          echo "::add-mask::${{ env.NOTIFICATION_KEY }}"
          # Print masked confirmation
          echo "YRAL_METADATA_NOTIFICATION_API_KEY = ***masked***"

      - name: Set as GitHub Secret via gh CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${{ env.NOTIFICATION_KEY }}" | gh secret set YRAL_METADATA_NOTIFICATION_API_KEY -R dolr-ai/yral-chat-ai
          echo "Secret set as GitHub repository secret"
