# ---------------------------------------------------------------------------
# docker-compose.yml — tells Docker HOW to run the app container.
#
# WHAT IS DOCKER COMPOSE?
# Docker Compose reads this YAML file and starts/stops containers based on
# what's defined here. It's like a recipe: "run THIS image, with THESE
# environment variables, on THESE networks, with THESE resource limits."
#
# WHAT IS YAML?
# YAML is a configuration file format. It uses indentation (spaces) to
# show structure. Key-value pairs look like "key: value". Lists use "- item".
# Lines starting with # are comments (ignored by Docker).
#
# WHAT DO THE ${VAR} THINGS MEAN?
# They're variables that get replaced with real values from project.config.
# Before running "docker compose up", the deploy script does:
#   set -a; source project.config; set +a
# This loads all the KEY=value pairs into the shell environment, and
# Docker Compose substitutes ${VAR} with the real values.
# Example: ${IMAGE_REPO} becomes "ghcr.io/dolr-ai/yral-chat-ai"
#
# Counter app — runs on rishi-1 and rishi-2 via plain docker-compose (not Swarm).
# Also runs locally via local/docker-compose.yml.
#
# All ${VAR} interpolations come from the SHELL ENV. The deploy script and
# local/setup.sh both `set -a; source project.config; set +a` before running
# `docker compose up`. Compose v2 also reads .env files automatically, but
# we use the explicit shell-env path so the same project.config drives both
# stack files (Swarm) and compose files (regular).
#
# WHY a secret file for DATABASE_URL?
# DATABASE_URL contains the postgres password. Env vars are visible in
# `docker inspect`. Mounting it as a file in /run/secrets/ keeps it out of
# inspect output. CI writes ./secrets/database_url before running compose up.

services:
  app:
    image: ${IMAGE_REPO}:${IMAGE_TAG:-latest}
    container_name: ${PROJECT_REPO}
    # `always` (not `unless-stopped`) so the container also restarts after a
    # crash/SIGKILL. unless-stopped sometimes doesn't kick in for SIGKILL.
    restart: always
    # Resource limits — prevent a single app container from OOM-killing the
    # host or starving other services (Patroni, etcd, HAProxy, Caddy).
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    expose:
      - "8000"
    networks:
      - web
      - db-internal
    environment:
      # --- Error tracking ---
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_RELEASE: ${IMAGE_TAG:-unknown}
      SENTRY_ENVIRONMENT: production
      PROJECT_REPO: ${PROJECT_REPO}
      # --- AI / LLM ---
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # --- S3 media storage ---
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_REGION: ${AWS_REGION:-eu-central-1}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_PUBLIC_URL_BASE: ${S3_PUBLIC_URL_BASE:-}
      # --- Image generation ---
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN:-}
      # --- Push notifications ---
      METADATA_URL: ${METADATA_URL:-https://metadata.yral.com}
      YRAL_METADATA_NOTIFICATION_API_KEY: ${YRAL_METADATA_NOTIFICATION_API_KEY:-}
      # --- Admin ---
      ADMIN_KEY_TO_DELETE_INFLUENCER: ${ADMIN_KEY_TO_DELETE_INFLUENCER:-}
      # --- Google Chat webhook (admin notifications) ---
      GOOGLE_CHAT_WEBHOOK_URL: ${GOOGLE_CHAT_WEBHOOK_URL:-}
      # --- CORS ---
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    secrets:
      - database_url
    healthcheck:
      # python:3.12-slim doesn't ship curl. Use python's stdlib urllib so we
      # don't add an apt layer just for healthchecks. Exits 0 on 2xx, 1 otherwise.
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=5).status==200 else 1)"
      # SHORT interval (5s) so the canary deploy script gets fast feedback —
      # waiting 30s per check made deploys agonizing AND stretched the rollback
      # window. start_period gives the app 30s to import + open the DB pool
      # before failures count toward the unhealthy threshold.
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 30s

secrets:
  # CI writes ./secrets/database_url with the server-specific connection string
  # (haproxy-rishi-1 vs haproxy-rishi-2) before docker compose up.
  database_url:
    file: ./secrets/database_url

networks:
  web:
    external: true
  db-internal:
    external: true
    name: ${OVERLAY_NETWORK}
