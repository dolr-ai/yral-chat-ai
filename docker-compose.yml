# ---------------------------------------------------------------------------
# docker-compose.yml — tells Docker HOW to run the app container.
#
# WHAT IS DOCKER COMPOSE?
# Docker Compose reads this YAML file and starts/stops containers based on
# what's defined here. It's like a recipe: "run THIS image, with THESE
# environment variables, on THESE networks, with THESE resource limits."
#
# WHAT IS YAML?
# YAML is a configuration file format. It uses indentation (spaces) to
# show structure. Key-value pairs look like "key: value". Lists use "- item".
# Lines starting with # are comments (ignored by Docker).
#
# WHAT DO THE ${VAR} THINGS MEAN?
# They're variables that get replaced with real values from project.config.
# Before running "docker compose up", the deploy script does:
#   set -a; source project.config; set +a
# This loads all the KEY=value pairs into the shell environment, and
# Docker Compose substitutes ${VAR} with the real values.
# Example: ${IMAGE_REPO} becomes "ghcr.io/dolr-ai/yral-chat-ai"
#
# Counter app — runs on rishi-1 and rishi-2 via plain docker-compose (not Swarm).
# Also runs locally via local/docker-compose.yml.
#
# All ${VAR} interpolations come from the SHELL ENV. The deploy script and
# local/setup.sh both `set -a; source project.config; set +a` before running
# `docker compose up`. Compose v2 also reads .env files automatically, but
# we use the explicit shell-env path so the same project.config drives both
# stack files (Swarm) and compose files (regular).
#
# WHY a secret file for DATABASE_URL?
# DATABASE_URL contains the postgres password. Env vars are visible in
# `docker inspect`. Mounting it as a file in /run/secrets/ keeps it out of
# inspect output. CI writes ./secrets/database_url before running compose up.

services:
  app:
    image: ${IMAGE_REPO}:${IMAGE_TAG:-latest}
    container_name: ${PROJECT_REPO}
    # `always` (not `unless-stopped`) so the container also restarts after a
    # crash/SIGKILL. unless-stopped sometimes doesn't kick in for SIGKILL.
    restart: always
    # Resource limits — prevent a single app container from OOM-killing the
    # host or starving other services (Patroni, etcd, HAProxy, Caddy).
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    expose:
      - "8000"
    # The app joins TWO networks:
    #   - web         : local bridge on THIS server. Caddy on the same host
    #                   reaches the app via this bridge using the container
    #                   name (${PROJECT_REPO}).
    #   - db-internal : Swarm OVERLAY network spanning rishi-1 + rishi-2 (+
    #                   rishi-3 for DB only). Originally existed so the app
    #                   could reach HAProxy/Patroni. Now ALSO used by Caddy on
    #                   each host to reach the PEER host's app container when
    #                   the local one is unhealthy (multi-upstream failover).
    #
    # The per-host alias `${PROJECT_REPO}-${SERVER_NAME}` is what makes that
    # peer-reach work: each host's container gets a globally unique alias on
    # the overlay (e.g. `yral-chat-ai-rishi-1` vs `yral-chat-ai-rishi-2`) so
    # Caddy can name the exact peer it wants, instead of round-robining the
    # unqualified service name. SERVER_NAME is exported by deploy-app.sh.
    networks:
      web:
      db-internal:
        aliases:
          - ${PROJECT_REPO}-${SERVER_NAME}
    environment:
      # --- Error tracking ---
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_RELEASE: ${IMAGE_TAG:-unknown}
      SENTRY_ENVIRONMENT: production
      # Sample-rate overrides (added 2026-04-22 to relieve rishi-3 CPU).
      # Errors are ALWAYS 100 % — these only affect transactions + profiles.
      # 0.5 transactions: keeps ~90 samples/min per service at current traffic,
      # plenty for tight P95. 0.05 profiles: occasional flame-graph samples
      # without burning the profiling pipeline continuously.
      # If CPU pressure returns, drop both further (or open inbound filters first).
      SENTRY_TRACES_RATE: "0.5"
      SENTRY_PROFILES_RATE: "0.05"
      PROJECT_REPO: ${PROJECT_REPO}
      # --- AI / LLM ---
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # --- S3 media storage ---
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_REGION: ${AWS_REGION:-eu-central-1}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_PUBLIC_URL_BASE: ${S3_PUBLIC_URL_BASE:-}
      # --- Image generation ---
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN:-}
      # --- Push notifications ---
      METADATA_URL: ${METADATA_URL:-https://metadata.yral.com}
      YRAL_METADATA_NOTIFICATION_API_KEY: ${YRAL_METADATA_NOTIFICATION_API_KEY:-}
      # --- Admin ---
      ADMIN_KEY_TO_DELETE_INFLUENCER: ${ADMIN_KEY_TO_DELETE_INFLUENCER:-}
      # --- Google Chat webhook (admin notifications) ---
      GOOGLE_CHAT_WEBHOOK_URL: ${GOOGLE_CHAT_WEBHOOK_URL:-}
      # --- CORS ---
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    secrets:
      - database_url
    healthcheck:
      # python:3.12-slim doesn't ship curl. Use python's stdlib urllib so we
      # don't add an apt layer just for healthchecks. Exits 0 on 2xx, 1 otherwise.
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=5).status==200 else 1)"
      # SHORT interval (5s) so the canary deploy script gets fast feedback —
      # waiting 30s per check made deploys agonizing AND stretched the rollback
      # window. start_period gives the app 30s to import + open the DB pool
      # before failures count toward the unhealthy threshold.
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 30s

  # -----------------------------------------------------------------------
  # METABASE — Analytics dashboard for viewing chat data.
  #
  # WHAT IS METABASE?
  # Metabase is an open-source analytics tool that connects to your database
  # and lets you build charts, dashboards, and run SQL queries through a
  # web interface. No code needed — point and click.
  #
  # HOW TO ACCESS:
  # Via Caddy reverse proxy at: https://metabase-chat-ai.rishi.yral.com
  # (Caddy snippet added during deploy — see caddy/metabase.caddy.template)
  #
  # DATABASE CONNECTION:
  # On first login, configure Metabase to connect to our PostgreSQL:
  #   Host: haproxy-rishi-1 (or haproxy-rishi-2)
  #   Port: 5432
  #   Database: chat_ai_db
  #   User: postgres
  #   Password: (from .bootstrap-secrets/postgres_password)
  #
  # STORAGE:
  # Metabase stores its own config (dashboards, users, settings) in an
  # embedded H2 database at /metabase-data/metabase.db. This is persisted
  # in a Docker volume so dashboards survive container restarts.
  # -----------------------------------------------------------------------
  metabase:
    image: metabase/metabase:latest
    container_name: ${PROJECT_REPO}-metabase
    restart: always
    environment:
      # URL where Metabase is accessible (for generating correct links)
      MB_SITE_URL: https://metabase-${PROJECT_NAME}.rishi.yral.com
      # Timezone for date displays
      JAVA_TIMEZONE: UTC
      # Use embedded H2 database for Metabase's own config
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - metabase_data:/metabase-data
    networks:
      - web
      - db-internal
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

secrets:
  # CI writes ./secrets/database_url with the server-specific connection string
  # (haproxy-rishi-1 vs haproxy-rishi-2) before docker compose up.
  database_url:
    file: ./secrets/database_url

volumes:
  # Persistent storage for Metabase config (dashboards, users, settings).
  # Survives container restarts and redeployments.
  metabase_data:

networks:
  web:
    external: true
  db-internal:
    external: true
    name: ${OVERLAY_NETWORK}
